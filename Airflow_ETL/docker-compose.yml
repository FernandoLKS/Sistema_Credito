services:

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile_airflow
    container_name: airflow-webserver
    ports:
      - "8080:8080"
    volumes:
      - ./Pipelines:/opt/airflow/Pipelines
      - ./Funcoes:/opt/airflow/Funcoes
      #- ./logs:/opt/airflow/logs
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__EXECUTOR: "LocalExecutor"
      AIRFLOW__CORE__DAGS_FOLDER: "/opt/airflow/Pipelines/dags"
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://postgres:postgres@host.docker.internal:5433/credito_data"
      AIRFLOW__CORE__FERNET_KEY: "wK9x0H9Z1z2l3Q0vT5mY6a3J7L8x9H0vW1Y2Z3A4B5E="
      AIRFLOW__WEBSERVER__SECRET_KEY: "admin123"
      #AIRFLOW__CORE__BASE_LOG_FOLDER: "/opt/airflow/logs"
      AIRFLOW__CORE__REMOTE_LOGGING: "False"
      PYTHONPATH: "/opt/airflow/Pipelines:/opt/airflow"
    command: >
      bash -c "
      airflow db init &&
      airflow users create --username airflow --password airflow --firstname admin --lastname user --role Admin --email admin@email.com &&
      airflow webserver
      "

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile_airflow
    container_name: airflow-scheduler
    volumes:
      - ./Pipelines:/opt/airflow/Pipelines
      - ./Funcoes:/opt/airflow/Funcoes
      #- ./logs:/opt/airflow/logs
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__EXECUTOR: "LocalExecutor"
      AIRFLOW__CORE__DAGS_FOLDER: "/opt/airflow/Pipelines/dags"
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://postgres:postgres@host.docker.internal:5433/credito_data"
      AIRFLOW__CORE__FERNET_KEY: "wK9x0H9Z1z2l3Q0vT5mY6a3J7L8x9H0vW1Y2Z3A4B5E="
      AIRFLOW__WEBSERVER__SECRET_KEY: "admin123"
      #AIRFLOW__CORE__BASE_LOG_FOLDER: "/opt/airflow/logs"
      AIRFLOW__CORE__REMOTE_LOGGING: "False"
      PYTHONPATH: "/opt/airflow/Pipelines:/opt/airflow"
    command: >
      bash -c "
      sleep 10 &&      
      airflow scheduler
      "
    depends_on:
      - airflow-webserver